# Adds the entry service on top of the base docker-compose.yaml, without
# editing that file directly (keeps this additive on top of upstream Open
# WebUI, so pulling future upstream compose changes doesn't conflict with
# the research embed setup).
#
# Caddy (the built-in HTTPS reverse proxy) is NOT in this file -- it's a
# separate, optional docker-compose.caddy.yml. That split exists because
# plenty of hosts already run their own reverse proxy (nginx-proxy-manager,
# Traefik, another Caddy instance, a cloud load balancer) on ports 80/443,
# and this stack shouldn't fight that for the ports. See "Already running
# your own reverse proxy?" in RESEARCH-EMBED.md.
#
# Usage:
#   No existing reverse proxy on this host -- add docker-compose.caddy.yml
#   too, and Caddy handles HTTPS for you automatically:
#     docker compose -f docker-compose.yaml -f docker-compose.research-embed.yml -f docker-compose.caddy.yml up -d
#
#   Already have your own reverse proxy -- omit docker-compose.caddy.yml,
#   point your existing proxy at the plain-HTTP ports open-webui and
#   entry-service publish below instead:
#     docker compose -f docker-compose.yaml -f docker-compose.research-embed.yml up -d
#
# Either way, this pulls prebuilt images from GHCR (see
# .github/workflows/research-embed-images.yml) instead of building anything
# locally -- should take seconds, not minutes, and has no risk of the
# frontend build's memory-hungry OOM crash.
#
# Zero-touch bootstrap: you do NOT need to set anything (beyond DOMAIN, if
# you're using docker-compose.caddy.yml) to bring this stack up. Just:
#   1. docker compose ... up -d
#   2. Open the site, create your admin account through the normal onboarding
#      screen.
#   3. Admin Panel > Settings > Research Embed > click "Connect Entry
#      Service". That's it -- no .env editing, no restart. See
#      backend/open_webui/routers/research_embed.py's /sync-entry-service
#      and entry-service/entry_service.py's /internal/admin-key for how.
#
# ENTRY_SERVICE_SYNC_SECRET authenticates the "Connect Entry Service" push
# above, but you don't need to set it: both containers auto-generate and
# share one via the `shared-secret` volume below the first time either side
# needs it (see _get_or_create_shared_secret in both research_embed.py and
# entry_service.py). Set it explicitly in .env only if you want a fixed,
# known value for a scripted/advanced deployment -- it takes priority over
# the auto-generated one if present.
#
# OPEN_WEBUI_ADMIN_API_KEY is similarly OPTIONAL -- only needed for
# scripted/advanced deployments that want to skip the "Connect Entry
# Service" button entirely by pre-supplying a key (it takes priority over
# anything pushed via the button).
#
# Everything else (model choice, seed message, participant ID format,
# allowed embed origin) is configured from Admin Panel > Settings >
# Research Embed once the stack is up -- no redeploy needed to change those.
#
# Before going live, double check:
#   - WEBUI_AUTH_TRUSTED_EMAIL_HEADER is NOT set anywhere for open-webui.
#     If it is, /api/v1/auths/signin takes a different code path and the
#     entry service's participant sign-ins will fail.
#   - If you ever turn on ENABLE_API_KEY_ENDPOINT_RESTRICTIONS (off by
#     default), add /api/v1/auths/add and /api/v1/research-embed/config to
#     API_KEY_ALLOWED_ENDPOINTS, or the entry service's admin calls will be
#     rejected.

services:
  open-webui:
    # Pulls the prebuilt image published by .github/workflows/research-embed-images.yml
    # (GitHub Actions -> GHCR) instead of building the frontend locally --
    # the frontend build is memory-hungry enough to OOM on a default
    # Docker/WSL2 memory limit, so most researchers should never need to
    # build it themselves. `docker compose up -d` with no `--build` flag
    # will just pull this.
    #
    # If you've forked this repo and want to run YOUR OWN changes: either
    # push to your fork's `main` branch (the Actions workflow publishes to
    # your own ghcr.io/<you>/<your-repo-name> automatically -- update the
    # image name below to match), or run
    # `docker compose -f docker-compose.yaml -f docker-compose.research-embed.yml build`
    # to build from source locally instead (the base compose file's `build:`
    # section is still there for this, untouched by this override file).
    #
    # `image:` is a scalar field, so unlike the `ports:` list note below,
    # Compose cleanly replaces the base file's
    # `ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}` (the real
    # upstream image name) with this fork's own image here.
    image: ghcr.io/jmt9454/open-webui-hci-studies:latest

    # `container_name:` is also scalar, so this cleanly replaces the base
    # file's hardcoded `open-webui` name. Needed on any host that already
    # runs a container literally named `open-webui` (common -- it's
    # upstream Open WebUI's own default container name too, so a shared
    # research/lab server that already runs a general-purpose instance will
    # collide with this fork's stack otherwise). Override
    # OPEN_WEBUI_CONTAINER_NAME in .env if you need something else (e.g.
    # running two different studies' stacks on the same host).
    #
    # NOTE: uses `:-` (not a bare `-`) deliberately. `.env.research-embed.example`
    # declares this as `OPEN_WEBUI_CONTAINER_NAME=` (present but blank) --
    # Compose's `${VAR-default}` only falls back to `default` when VAR is
    # completely UNSET, not when it's set-but-empty, so a bare `-` here would
    # resolve to an empty string and fail container_name's schema validation.
    # `:-` falls back on both "unset" and "empty," which is what we want.
    container_name: ${OPEN_WEBUI_CONTAINER_NAME:-open-webui-research-embed}

    # NOTE: Compose merges list fields (like the base file's `ports:` on
    # open-webui) across -f files by CONCATENATING them, not replacing them --
    # an empty `ports: []` override here would silently do nothing, leaving
    # :3000 exposed. If you want Caddy to be the only public entry point,
    # remove or comment out the `ports:` line under open-webui in the base
    # docker-compose.yaml directly instead of trying to override it here.
    #
    # This same list-concatenation behavior is what makes it safe to add
    # `environment:` here too -- it appends to the base file's OLLAMA_BASE_URL
    # / WEBUI_SECRET_KEY entries rather than replacing them.
    environment:
      - ENTRY_SERVICE_BASE_URL=http://entry-service:9000
      # Optional override -- see the "Zero-touch bootstrap" note above. The
      # `:-` default (rather than a bare `${ENTRY_SERVICE_SYNC_SECRET}`) is
      # what stops Compose from printing a "variable is not set" warning when
      # you haven't set one, since leaving it unset is the normal case now.
      - ENTRY_SERVICE_SYNC_SECRET=${ENTRY_SERVICE_SYNC_SECRET:-}
      # Participant accounts are created exclusively by the entry service
      # via the admin API -- the normal public sign-up page has no business
      # being open on a research-embed deployment. Left on, anyone who finds
      # the real Open WebUI URL (not just the /enter embed link) could
      # self-register a normal, non-chat-only account, or a mischievous
      # participant could register under the same email domain the entry
      # service uses and mess with chat-only detection. Override to `true`
      # here (or in your own .env) if you actually want public sign-ups for
      # some other reason.
      - ENABLE_SIGNUP=false
    volumes:
      # Where open-webui and entry-service auto-negotiate the shared sync
      # secret on first boot -- see the "Zero-touch bootstrap" note above.
      - shared-secret:/shared

  entry-service:
    # Same pull-by-default / build-if-you-forked pattern as open-webui above,
    # though this one's build is small and fast (no OOM risk) if you'd
    # rather just always build it locally -- either works.
    image: ghcr.io/jmt9454/open-webui-hci-studies-entry:latest
    build: ./entry-service
    container_name: entry-service
    ports:
      # Published so an EXISTING reverse proxy (if you're skipping
      # docker-compose.caddy.yml) can route /enter* here directly, the same
      # way it's already reachable at http://entry-service:9000 from inside
      # the Docker network (that's how Caddy or any proxy on this network
      # reaches it; this port mapping is only needed for a proxy running
      # outside this Docker network, e.g. nginx-proxy-manager on the host).
      # Change the host side if 9000 is already taken by something else.
      # (Uses `:-`, not a bare `-`, for the same reason as OPEN_WEBUI_CONTAINER_NAME
      # above -- .env.research-embed.example declares this blank rather than
      # leaving it unset.)
      - ${ENTRY_SERVICE_PORT:-9000}:9000
    environment:
      - OPEN_WEBUI_BASE_URL=http://open-webui:8080
      - ENTRY_SERVICE_SYNC_SECRET=${ENTRY_SERVICE_SYNC_SECRET:-}
      # Optional -- see the zero-touch bootstrap note at the top of this file.
      # Defaults to empty rather than failing compose if you haven't set one;
      # entry_service.py treats "no key yet" as a normal, expected startup
      # state and /enter says so clearly until you click "Connect Entry
      # Service" (or set this directly, for scripted/advanced deployments).
      - OPEN_WEBUI_ADMIN_API_KEY=${OPEN_WEBUI_ADMIN_API_KEY:-}
    volumes:
      - entry-data:/data
      - shared-secret:/shared
    depends_on:
      open-webui:
        condition: service_started
    restart: unless-stopped

volumes:
  entry-data: {}
  # Tiny volume holding a single auto-generated file (the shared sync
  # secret) -- see the "Zero-touch bootstrap" note at the top of this file.
  shared-secret: {}
